<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الألعاب - Mohamed Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DMEPY9VS9R"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-DMEPY9VS9R');
</script>
    <style>
        :root { --neon-blue: #00e1ff; --neon-purple: #bc13fe; --bg-dark: #000000; --bg-light: #ffffff; }
        body { background-color: var(--bg-dark); color: #ffffff; transition: 0.3s; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        body.light-mode { background-color: var(--bg-light); color: #212529; }
        .product-card { background: rgba(29, 43, 71, 0.74); border-radius: 20px; padding: 20px; border: 2px solid #333; text-align: center; height: 100%; transition: 0.4s; }
        .light-mode .product-card { background: #ffffff; border: 1px solid #ddd; }
        /* تنسيق الصورة */
        .game-img { width: 40px; height: 40px; border-radius: 50%; margin-left: 10px; vertical-align: middle; }
        .btn-buy { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); width: 100%; padding: 10px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-buy:hover { background: var(--neon-blue); color: #000; }
        .id-input { background: rgba(20, 25, 35, 0.9) !important; color: white !important; border: 2px solid var(--neon-purple) !important; padding: 15px; border-radius: 50px; text-align: center; width: 100%; margin-bottom: 25px; }
        .light-mode .id-input { background: #eee !important; color: #333 !important; }
        .tab-btn { cursor: pointer; padding: 10px 20px; background: #1a1a2e; border: 1px solid var(--neon-blue); border-radius: 50px; margin: 5px; color: var(--neon-blue); }
        .tab-btn:hover { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="d-flex justify-content-between mb-4">
        <div>
            <span class="tab-btn" onclick="show('pubg')">PUBG</span>
            <span class="tab-btn" onclick="show('ff')">FREE FIRE</span>
            <span class="tab-btn" onclick="show('valorant')">VALORANT</span>
            <span class="tab-btn" onclick="show('cod')">COD</span>
        </div>
        <button class="btn btn-secondary" onclick="document.body.classList.toggle('light-mode')"><i class="fas fa-adjust"></i></button>
    </div>
    
    <input type="text" id="playerId" class="id-input" placeholder="أدخل معرف اللاعب (ID)...">

    <!-- دالة لتوليد الكروت -->
    <script>
        function renderGames(items, imgPath) {
            items.forEach(item => {
                document.write(`
                    <div class="col-6 col-md-4">
                        <div class="product-card">
                            <h6><img src="${imgPath}" class="game-img"> ${item.name}</h6>
                            <p>${item.price}</p>
                            <button class="btn-buy" onclick="buy('${item.name}')"><i class="fab fa-whatsapp"></i> شراء</button>
                        </div>
                    </div>
                `);
            });
        }
    </script>

    <!-- الأقسام -->
    <div id="pubg" class="game-section"><div class="row g-3">
        <script>
            renderGames([
                {name: "60 شدة", price: "50 ج.م"}, {name: "325 شدة", price: "280 ج.م"}, {name: "660 شدة", price: "550 ج.م"}, {name: "1800 شدة", price: "1450 ج.م"}, {name: "3850 شدة", price: "2900 ج.م"}, {name: "8100 شدة", price: "5800 ج.م"}, {name: "12000 شدة", price: "8500 ج.م"}, {name: "16000 شدة", price: "11000 ج.م"}, {name: "20000 شدة", price: "13500 ج.م"}
            ], "images.jpeg"); // ضع مسار صورة ببجي هنا
        </script>
    </div></div>

    <div id="ff" class="game-section" style="display:none;"><div class="row g-3">
        <script>
            renderGames([
                {name: "100 جوهرة", price: "40 ج.م"}, {name: "310 جوهرة", price: "120 ج.م"}, {name: "520 جوهرة", price: "200 ج.م"}, {name: "1060 جوهرة", price: "400 ج.م"}, {name: "2180 جوهرة", price: "800 ج.م"}, {name: "5600 جوهرة", price: "2000 ج.م"}, {name: "7000 جوهرة", price: "2500 ج.م"}, {name: "10000 جوهرة", price: "3500 ج.م"}, {name: "15000 جوهرة", price: "5200 ج.م"}
            ], "images (1).jpeg"); // ضع مسار صورة فري فاير هنا
        </script>

    </div></div>
    <div id="valorant" class="game-section" style="display:none;"><div class="row g-3">
        <script>
            renderGames([
                {name: "350 VP", price: "200 ج.م"}, {name: "750 VP", price: "400 ج.م"}, {name: "1300 VP", price: "650 ج.م"}, {name: "2500 VP", price: "1200 ج.م"}, {name: "4400 VP", price: "2100 ج.م"}, {name: "8100 VP", price: "3800 ج.م"}, {name: "10000 VP", price: "4600 ج.م"}, {name: "12000 VP", price: "5500 ج.م"}
                , {name: "15000 VP", price: "6800 ج.م"}
            ], "images (3).jpeg"); // ضع مسار صورة ببجي هنا
        </script>
    </div></div>

    <div id="cod" class="game-section" style="display:none;"><div class="row g-3">
        <script>
            renderGames([
                {name: "80 CP", price: "70 ج.م"}, {name: "420 CP", price: "350 ج.م"}, {name: "880 CP", price: "700 ج.م"}, {name: "2400 CP", price: "1700 ج.م"}, {name: "5000 CP", price: "3400 ج.م"}, {name: "10800 CP", price: "6800 ج.م"}, {name: "15000 CP", price: "9500 ج.م"}, {name: "20000 CP", price: "12500 ج.م"}
                , {name: "25000 CP", price: "15500 ج.م"}
            ], "images (2).jpeg"); // ضع مسار صورة ببجي هنا
        </script>
    </div></div>
    <!-- كرر نفس النمط للـ Valorant و COD -->
   
</div>

<script>
    function show(game) { document.querySelectorAll('.game-section').forEach(s => s.style.display = 'none'); document.getElementById(game).style.display = 'block'; }
    function buy(item) { var id = document.getElementById('playerId').value; if (!id) { alert("من فضلك أدخل الـ ID أولاً!"); return; } window.location.href = "https://wa.me/201552523889?text=أريد شراء " + item + " ID: " + id; }
</script>
</body>
</html>
